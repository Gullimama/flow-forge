apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: flowforge-pubsub
  namespace: flowforge
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis-master.flowforge-infra.svc.cluster.local:80
    - name: redisPassword
      secretKeyRef:
        name: redis-secret
        key: password

