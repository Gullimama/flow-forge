apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neo4j
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: flowforge
  destination:
    server: https://kubernetes.default.svc
    namespace: flowforge-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://helm.neo4j.com/neo4j
      chart: neo4j
      targetRevision: 5.25.1
      helm:
        valueFiles:
          - $values/k8s/infrastructure/neo4j/values.yaml
        # AKS: only port 80 allowed; patch default + admin Service port 7687 -> 80 (preserve indent)
        postRenderers:
          - exec:
              command: ["/bin/sh", "-c", "sed -E 's/^([[:space:]]*)port: 7687/\\1port: 80/'"]
    - repoURL: https://github.com/Gullimama/flow-forge.git
      targetRevision: main
      ref: values
