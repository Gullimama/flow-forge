apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: flowforge
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 61.*
      helm:
        valueFiles:
          - $values/k8s/observability/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/Gullimama/flow-forge.git
      targetRevision: main
      ref: values
    # AKS port 80: override multi-port Prometheus/Alertmanager Services (replaces Helm-generated ones)
    - repoURL: https://github.com/Gullimama/flow-forge.git
      targetRevision: main
      path: k8s/observability/kube-prometheus-stack-port80
  destination:
    server: https://kubernetes.default.svc
    namespace: flowforge-obs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

