singleNode: true
replicas: 1

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 2Gi

config:
  opensearch.yml: |
    plugins.security.disabled: true

opensearchJavaOpts: "-Xmx1g -Xms1g"

persistence:
  enabled: true
  size: 100Gi
  storageClass: managed
  enableInitChown: false

service:
  type: ClusterIP
  # AKS: Service port 80 is applied by post-render (chart uses 9200/9300/9600 for containerPort)
