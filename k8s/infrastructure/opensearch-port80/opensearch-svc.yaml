# AKS: override OpenSearch Services to use port 80 (replaces Helm-generated Services)
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster-master
  namespace: flowforge-infra
  labels:
    app.kubernetes.io/name: opensearch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: opensearch-cluster-master
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster-master-headless
  namespace: flowforge-infra
  labels:
    app.kubernetes.io/name: opensearch
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: opensearch-cluster-master
  ports:
    - name: http
      port: 80
      targetPort: 9200
