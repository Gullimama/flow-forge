# Required for ArgoCD: chart lookups fail when Argo uses helm template
disableLookups: true

neo4j:
  name: neo4j
  edition: community
  password: "flowforge"
  resources:
    cpu: "2"
    memory: "8Gi"  # AKS will scale up; sufficient for graph workload

image:
  customImage: neo4j:5.25-community

config:
  server.memory.heap.initial_size: "4g"
  server.memory.heap.max_size: "4g"
  server.memory.pagecache.size: "2g"
  server.directories.plugins: /var/lib/neo4j/plugins
  server.security.procedures.unrestricted: "apoc.*"
  # AKS: only port 80 allowed; disable http/https so post-render can expose bolt on 80 only
  server.http.enabled: "false"
  server.https.enabled: "false"

apoc:
  enabled: true

volumes:
  data:
    mode: dynamic
    dynamic:
      storageClassName: managed
      accessModes:
        - ReadWriteOnce
      requests:
        storage: 50Gi

# AKS policy: only port 80 allowed
services:
  # LoadBalancer service (neo4j-lb-neo4j): bolt on 80 only
  neo4j:
    enabled: true
    spec:
      type: ClusterIP
    ports:
      http:
        enabled: false
      https:
        enabled: false
      bolt:
        enabled: true
        port: 80
        targetPort: 7687
        name: tcp-bolt
