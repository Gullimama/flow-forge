# Required for ArgoCD: chart lookups fail when Argo uses helm template
disableLookups: true

neo4j:
  name: neo4j
  edition: community
  password: "flowforge"
  resources:
    cpu: "4"
    memory: "8Gi"

image:
  customImage: neo4j:5.25-community

config:
  server.memory.heap.initial_size: "4g"
  server.memory.heap.max_size: "4g"
  server.memory.pagecache.size: "2g"
  server.directories.plugins: /var/lib/neo4j/plugins
  server.security.procedures.unrestricted: "apoc.*"

apoc:
  enabled: true

volumes:
  data:
    mode: dynamic
    dynamic:
      storageClassName: standard
      accessModes:
        - ReadWriteOnce
      requests:
        storage: 50Gi

services:
  neo4j:
    spec:
      type: ClusterIP
      ports:
        - name: tcp-bolt
          protocol: TCP
          port: 7687
          targetPort: 7687
        - name: tcp-http
          protocol: TCP
          port: 7474
          targetPort: 7474
