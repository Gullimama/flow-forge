# Required for ArgoCD: chart lookups fail when Argo uses helm template
disableLookups: true

neo4j:
  name: neo4j
  edition: community
  password: "flowforge"
  resources:
    cpu: "1"
    memory: "2Gi"

image:
  customImage: neo4j:5.25-community

config:
  server.memory.heap.initial_size: "768m"
  server.memory.heap.max_size: "768m"
  server.memory.pagecache.size: "256m"
  server.directories.plugins: /var/lib/neo4j/plugins
  server.security.procedures.unrestricted: "apoc.*"

apoc:
  enabled: true

volumes:
  data:
    mode: dynamic
    dynamic:
      storageClassName: managed
      accessModes:
        - ReadWriteOnce
      requests:
        storage: 50Gi

# AKS policy: only port 80 allowed; expose bolt on 80 (http/7474 omitted to avoid duplicate port)
services:
  neo4j:
    spec:
      type: ClusterIP
      ports:
        - name: tcp-bolt
          protocol: TCP
          port: 80
          targetPort: 7687
