global:
  logAsJson: true

  # AKS policy: only port 80 allowed for Services.
  # Disable Dapr actors so the placement service (ports 50005/8201) and its Service are not created.
  actors:
    enabled: false

dashboard:
  enabled: true

injector:
  resources:
    requests:
      cpu: "250m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

sidecarInjectorWebhook:
  resources:
    requests:
      cpu: "250m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

placement:
  resources:
    requests:
      cpu: "250m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

