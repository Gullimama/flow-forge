mode: standalone

auth:
  existingSecret: flowforge-minio-credentials   # keys: root-user, root-password
  secretKeys:
    rootUserKey: root-user
    rootPasswordKey: root-password

persistence:
  enabled: true
  size: 100Gi
  storageClass: managed-csi

defaultBuckets: >-
  raw-git,
  raw-logs,
  parsed-code,
  parsed-logs,
  graph-artifacts,
  research-output,
  model-artifacts,
  evidence

resources:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi

nodeSelector:
  agentpool: cpupool

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: flowforge-obs
