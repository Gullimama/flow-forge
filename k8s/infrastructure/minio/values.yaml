# Official MinIO chart (minio/minio) - https://charts.min.io/
mode: standalone

rootUser: flowforge
rootPassword: flowforge

image:
  repository: quay.io/minio/minio
  tag: RELEASE.2024-12-18T13-15-44Z
  pullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 100Gi
  storageClass: standard

# Buckets to create after install (names only; policy defaults)
buckets:
  - name: raw-git
  - name: raw-logs
  - name: parsed-code
  - name: parsed-logs
  - name: graph-artifacts
  - name: research-output
  - name: model-artifacts
  - name: evidence

resources:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi
