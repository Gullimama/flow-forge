apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-reranker
  namespace: flowforge-ml
  labels:
    app.kubernetes.io/name: tei-reranker
    app.kubernetes.io/component: reranker
    app.kubernetes.io/part-of: flowforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tei-reranker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tei-reranker
        app.kubernetes.io/component: reranker
    spec:
      containers:
        - name: tei-reranker
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
          args:
            - --model-id
            - BAAI/bge-reranker-v2-m3
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "2"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: tei-reranker-model-cache
