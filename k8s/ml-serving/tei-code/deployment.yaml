apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-code
  namespace: flowforge-ml
  labels:
    app.kubernetes.io/name: tei-code
    app.kubernetes.io/component: embedding
    app.kubernetes.io/part-of: flowforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tei-code
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tei-code
        app.kubernetes.io/component: embedding
    spec:
      containers:
        - name: tei-code
          image: ghcr.io/huggingface/text-embeddings-inference:1.5
          args:
            - --model-id
            - codesage/codesage-large
            - --port
            - "8081"
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "2"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: tei-code-model-cache
