apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-log
  namespace: flowforge-ml
  labels:
    app.kubernetes.io/name: tei-log
    app.kubernetes.io/component: embedding
    app.kubernetes.io/part-of: flowforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tei-log
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tei-log
        app.kubernetes.io/component: embedding
    spec:
      containers:
        - name: tei-log
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
          args:
            - --model-id
            - intfloat/e5-large-v2
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "2"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: tei-log-model-cache
