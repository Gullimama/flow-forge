# AKS policy: only port 80 allowed on Services.
# kube-prometheus-stack creates multi-port Services for Prometheus/Alertmanager (incl. reloader-web:8080).
# These overrides replace those Services with a single port 80 mapping to the main UI port.

apiVersion: v1
kind: Service
metadata:
  name: obs-kube-prometheus-stack-prometheus
  namespace: flowforge-obs
  labels:
    app: kube-prometheus-stack-prometheus
    app.kubernetes.io/name: kube-prometheus-stack-prometheus
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  publishNotReadyAddresses: false
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: obs-kube-prometheus-stack-prometheus
  ports:
    - name: http-web
      protocol: TCP
      port: 80
      targetPort: 9090

---

apiVersion: v1
kind: Service
metadata:
  name: obs-kube-prometheus-stack-alertmanager
  namespace: flowforge-obs
  labels:
    app: kube-prometheus-stack-alertmanager
    app.kubernetes.io/name: kube-prometheus-stack-alertmanager
    app.kubernetes.io/component: alertmanager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
    alertmanager: obs-kube-prometheus-stack-alertmanager
  ports:
    - name: http-web
      protocol: TCP
      port: 80
      targetPort: 9093

