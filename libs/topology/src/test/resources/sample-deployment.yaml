apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: production
  labels:
    app: booking-service
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: booking-service
          image: registry.example.com/booking-service:1.2.3
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: db-password
