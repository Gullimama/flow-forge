# Resilience4j for cross-encoder reranker (Stage 17)
# Include in application.yml or activate profile 'reranker' when using libs:reranker
resilience4j:
  circuitbreaker:
    instances:
      reranker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      reranker:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
